<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Meta Description -->
    <meta name="description" content="Explore an album of nine beautiful temples with images and captions. Enjoy a responsive photo gallery featuring historic and modern temples.">
    
    <!-- Meta Author -->
    <meta name="author" content="Erubami Freedom">

    <title>Temple Album</title>

    <!-- Google Fonts Preconnect and Link -->

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- CSS Files -->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <!-- JavaScript -->
    <script src="scripts/temples.js" defer></script>
</head>

        <nav>

            <a href="#">Small</a>

            </figure>
            <figure>
                <img src="images/temple-7.jpg" alt="Temple 7">

            </figure>
            <figure>
                <img src="images/temple-8.jpg" alt="Temple 8">

    <footer>
        <p>&copy; <span id="year"></span> Erubami Freedom. Last modified: <span id="last-modified"></span></p>

</html>
