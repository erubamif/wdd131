<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description" content="Submit your detailed product review including rating, features, and installation date.">
    <meta name="author" content="Erubami Freedom">
    <link rel="stylesheet" href="styles/form.css">
    <script defer src="scripts/form.js"></script>
</head>
<body>
    <header>
        <h1>Product Review Form</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            <!-- Product Name -->
            <label for="product">Product Name:</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>

            <!-- Overall Rating -->
            <fieldset>
                <legend>Overall Rating:</legend>
                <input type="radio" id="star1" name="rating" value="1" required>
                <label for="star1">1</label>
                <input type="radio" id="star2" name="rating" value="2" required>
                <label for="star2">2</label>
                <input type="radio" id="star3" name="rating" value="3" required>
                <label for="star3">3</label>
                <input type="radio" id="star4" name="rating" value="4" required>
                <label for="star4">4</label>
                <input type="radio" id="star5" name="rating" value="5" required>
                <label for="star5">5</label>
            </fieldset>

            <!-- Date of Installation -->
            <label for="installDate">Date of Installation:</label>
            <input type="date" id="installDate" name="installDate" required>

            <!-- Useful Features -->
            <fieldset>
                <legend>Useful Features:</legend>
                <input type="checkbox" id="feature1" name="features" value="Feature A">
                <label for="feature1">Feature A</label>
                <input type="checkbox" id="feature2" name="features" value="Feature B">
                <label for="feature2">Feature B</label>
                <input type="checkbox" id="feature3" name="features" value="Feature C">
                <label for="feature3">Feature C</label>
                <input type="checkbox" id="feature4" name="features" value="Feature D">
                <label for="feature4">Feature D</label>
            </fieldset>

            <!-- Written Review -->
            <label for="review">Written Review:</label>
            <textarea id="review" name="review" rows="5" cols="33"></textarea>

            <!-- User Name -->
            <label for="username">Your Name (optional):</label>
            <input type="text" id="username" name="username">

            <!-- Submit Button -->
            <input type="submit" value="Submit Review">
        </form>
    </main>

    <footer>
        &copy; <span id="year"></span> Erubami Freedom. Last Modified: <span id="last-modified"></span>
    </footer>
</body>
</html>
