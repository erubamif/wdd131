<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Review Form</title>
  <meta name="description" content="Submit your product review using this form.">
  <meta name="author" content="Erubami Freedom">
  <link rel="stylesheet" href="styles/form.css">
  <script defer src="scripts/form.js"></script>
</head>
<body>

<header>
  <h1>Product Review Form</h1>
</header>

<main>
  <form id="reviewForm" method="get" action="review.html">

    <!-- Product Name -->
    <label for="product">Product Name:</label>
    <select id="product" name="product" required>
      <option value="" disabled selected>Select a Product ...</option>
      <!-- Options will be populated dynamically -->
    </select>

    <!-- Overall Rating -->
    <fieldset>
      <legend>Overall Rating:</legend>
      <label>
        <input type="radio" id="star1" name="rating" value="1" required> 1☆
      </label>
      <label>
        <input type="radio" id="star2" name="rating" value="2"> 2☆
      </label>
      <label>
        <input type="radio" id="star3" name="rating" value="3"> 3☆
      </label>
      <label>
        <input type="radio" id="star4" name="rating" value="4"> 4☆
      </label>
      <label>
        <input type="radio" id="star5" name="rating" value="5"> 5☆
      </label>
    </fieldset>

    <!-- Date of Installation -->
    <label for="installDate">Date of Installation:</label>
    <input type="date" id="installDate" name="installDate" required>

    <!-- Useful Features -->
    <fieldset>
      <legend>Useful Features:</legend>
      <label>
        <input type="checkbox" id="feature1" name="features" value="Ease of Use"> Ease of Use
      </label>
      <label>
        <input type="checkbox" id="feature2" name="features" value="Performance"> Performance
      </label>
      <label>
        <input type="checkbox" id="feature3" name="features" value="Design"> Design
      </label>
      <label>
        <input type="checkbox" id="feature4" name="features" value="Durability"> Durability
      </label>
    </fieldset>

    <!-- Written Review -->
    <label for="review">Written Review:</label>
    <textarea id="review" name="review" rows="4" cols="50" placeholder="Write your review here..."></textarea>

    <!-- User Name -->
    <label for="userName">Your Name:</label>
    <input type="text" id="userName" name="userName" placeholder="Optional">

    <!-- Submit Button -->
    <input type="submit" value="Submit Review">

  </form>
</main>

<footer>
  <p>&copy; <span id="year"></span> Erubami Freedom. Last modified: <span id="last-modified"></span></p>
</footer>
