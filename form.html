<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description" content="Submit your detailed product review, including rating, features, and comments, to help us improve our products.">
    <meta name="author" content="Erubami Freedom">

    <!-- CSS File -->
    <link rel="stylesheet" href="styles/review.css">

    <!-- JavaScript File -->
    <script src="scripts/review.js" defer></script>
</head>
<body>
    <header>
        <h1>Submit Your Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            <!-- Product Name -->
            <label for="product">Product Name:</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product ...</option>
                <!-- Options will be populated dynamically by JavaScript -->
            </select>

            <!-- Overall Rating -->
            <fieldset>
                <legend>Overall Rating:</legend>
                <input type="radio" id="star1" name="rating" value="1" required>
                <label for="star1">☆</label>
                <input type="radio" id="star2" name="rating" value="2" required>
                <label for="star2">☆</label>
                <input type="radio" id="star3" name="rating" value="3" required>
                <label for="star3">☆</label>
                <input type="radio" id="star4" name="rating" value="4" required>
                <label for="star4">☆</label>
                <input type="radio" id="star5" name="rating" value="5" required>
                <label for="star5">☆</label>
            </fieldset>

            <!-- Date of Installation -->
            <label for="install-date">Date of Installation:</label>
            <input type="date" id="install-date" name="install-date" required>

            <!-- Useful Features -->
            <fieldset>
                <legend>Useful Features:</legend>
                <input type="checkbox" id="feature1" name="features" value="feature1">
                <label for="feature1">Feature 1</label>

                <input type="checkbox" id="feature2" name="features" value="feature2">
                <label for="feature2">Feature 2</label>

                <input type="checkbox" id="feature3" name="features" value="feature3">
                <label for="feature3">Feature 3</label>

                <input type="checkbox" id="feature4" name="features" value="feature4">
                <label for="feature4">Feature 4</label>
            </fieldset>

            <!-- Written Review -->
            <label for="review">Written Review:</label>
            <textarea id="review" name="review" rows="4" cols="50"></textarea>

            <!-- User Name -->
            <label for="username">Your Name:</label>
            <input type="text" id="username" name="username">

            <!-- Submit Button -->
            <input type="submit" value="Submit Review">
        </form>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> Erubami Freedom. Last modified: <span id="last-modified"></span></p>
    </footer>
</body>
</html>
