<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Images</title>
    <link rel="stylesheet" href="styles/responsive-images.css">
</head>
<body>

<main>
    <div class="hero">
        <picture>
            <!-- Large image for screens 1000px and wider -->
            <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
            
            <!-- Medium image for screens 500px and wider -->
            <source srcset="images/hero-medium.webp" media="(min-width: 500px)">
            
            <!-- Default image for smaller screens -->
            <img src="images/hero-small.webp" 
                 alt="Orem Utah Temple in scenic view" 
                 width="1500" 
                 height="750">
        </picture>
    </div>
</main>

</body>
</html>
